name: Monthly production backup

on:
  schedule:
    # Runs at 03:20 UTC on the first day of each month.
    - cron: "20 3 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  backup:
    name: Export production data
    runs-on: ubuntu-latest

    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
      COSMOS_CONNECTION_SECRET_NAME: ${{ vars.COSMOS_CONNECTION_SECRET_NAME }}
      BACKUP_STORAGE_CONNECTION_SECRET_NAME: ${{ vars.BACKUP_STORAGE_CONNECTION_SECRET_NAME }}
      COSMOS_DATABASE_NAME: ${{ vars.COSMOS_PROD_DATABASE_NAME }}
      BACKUP_CONTAINER_NAME: ${{ vars.BACKUP_CONTAINER_NAME }}
      BACKUP_PREFIX: cosmos-prod
      BACKUP_CONTAINERS: ${{ vars.BACKUP_CONTAINERS }}
      BACKUP_INCLUDE_REFRESH_TOKENS: ${{ vars.BACKUP_INCLUDE_REFRESH_TOKENS }}
      UPLOAD_STORAGE_CONNECTION_SECRET_NAME: ${{ vars.UPLOAD_STORAGE_CONNECTION_SECRET_NAME }}
      UPLOAD_CONTAINER_NAME: ${{ vars.UPLOAD_CONTAINER_NAME }}
      UPLOAD_BACKUP_PREFIX: uploads

    steps:
      - uses: actions/checkout@v4

      - name: Validate configuration
        run: |
          set -euo pipefail

          required_vars=(
            AZURE_CLIENT_ID
            AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID
            KEY_VAULT_NAME
            COSMOS_CONNECTION_SECRET_NAME
            BACKUP_STORAGE_CONNECTION_SECRET_NAME
            COSMOS_DATABASE_NAME
            BACKUP_CONTAINER_NAME
          )

          for name in "${required_vars[@]}"; do
            if [ -z "${!name}" ]; then
              echo "Missing repository variable: ${name}"
              exit 1
            fi
          done

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Read backup secrets from Key Vault
        run: |
          set -euo pipefail

          cosmos_connection_string="$(az keyvault secret show \
            --vault-name "${KEY_VAULT_NAME}" \
            --name "${COSMOS_CONNECTION_SECRET_NAME}" \
            --query value \
            --output tsv)"

          backup_storage_connection_string="$(az keyvault secret show \
            --vault-name "${KEY_VAULT_NAME}" \
            --name "${BACKUP_STORAGE_CONNECTION_SECRET_NAME}" \
            --query value \
            --output tsv)"

          if [ -z "${cosmos_connection_string}" ]; then
            echo "Cosmos connection string secret was empty."
            exit 1
          fi

          if [ -z "${backup_storage_connection_string}" ]; then
            echo "Backup storage connection string secret was empty."
            exit 1
          fi

          echo "::add-mask::${cosmos_connection_string}"
          echo "::add-mask::${backup_storage_connection_string}"
          echo "COSMOS_CONNECTION_STRING=${cosmos_connection_string}" >> "${GITHUB_ENV}"
          echo "BACKUP_STORAGE_CONNECTION_STRING=${backup_storage_connection_string}" >> "${GITHUB_ENV}"

          if [ -n "${UPLOAD_STORAGE_CONNECTION_SECRET_NAME}" ] || [ -n "${UPLOAD_CONTAINER_NAME}" ]; then
            if [ -z "${UPLOAD_STORAGE_CONNECTION_SECRET_NAME}" ]; then
              echo "UPLOAD_STORAGE_CONNECTION_SECRET_NAME must be set when UPLOAD_CONTAINER_NAME is set."
              exit 1
            fi

            if [ -z "${UPLOAD_CONTAINER_NAME}" ]; then
              echo "UPLOAD_CONTAINER_NAME must be set when UPLOAD_STORAGE_CONNECTION_SECRET_NAME is set."
              exit 1
            fi

            upload_storage_connection_string="$(az keyvault secret show \
              --vault-name "${KEY_VAULT_NAME}" \
              --name "${UPLOAD_STORAGE_CONNECTION_SECRET_NAME}" \
              --query value \
              --output tsv)"

            if [ -z "${upload_storage_connection_string}" ]; then
              echo "Upload storage connection string secret was empty."
              exit 1
            fi

            echo "::add-mask::${upload_storage_connection_string}"
            echo "UPLOAD_STORAGE_CONNECTION_STRING=${upload_storage_connection_string}" >> "${GITHUB_ENV}"
            echo "UPLOAD_CONTAINER_NAME=${UPLOAD_CONTAINER_NAME}" >> "${GITHUB_ENV}"
            echo "UPLOAD_BACKUP_PREFIX=${UPLOAD_BACKUP_PREFIX}" >> "${GITHUB_ENV}"
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore backup tool
        run: dotnet restore Tools/CosmosBackup/CosmosBackup.csproj

      - name: Run backup
        run: dotnet run --project Tools/CosmosBackup/CosmosBackup.csproj --configuration Release --no-restore
