name: Publish ServerAPI Docker image

on:
  push:
    branches:
      - main
    paths:
      - "Core/**"
      - "ServerAPI/**"
      - ".dockerignore"
      - ".github/workflows/publish-serverapi-image.yml"
      - "global.json"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/whist-serverapi

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      # Checkout is required so Docker can use the repository as build context.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Buildx is the recommended Docker builder for GitHub Actions.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR supports authentication with the built-in GITHUB_TOKEN.
      # No Personal Access Token is needed for packages owned by this repository.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Metadata action creates consistent OCI labels and image tags.
      # We publish:
      # - latest
      # - the exact commit SHA
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      # Build from the solution root because ServerAPI references Core.
      # The Dockerfile lives in ServerAPI/Dockerfile.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ServerAPI/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
