name: Test

on:
  pull_request:
    branches:
      - main
    paths:
      - "Core/**"
      - "ServerAPI/**"
      - "Whist.Tests/**"
      - "Whist.sln"
      - "global.json"
      - ".github/workflows/test.yml"
  push:
    branches:
      - main
    paths:
      - "Core/**"
      - "ServerAPI/**"
      - "Whist.Tests/**"
      - "Whist.sln"
      - "global.json"
      - ".github/workflows/test.yml"

permissions:
  contents: read

jobs:
  test:
    name: Run .NET tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Whist.sln

      - name: Test
        run: dotnet test Whist.sln --configuration Release --no-restore
